<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-20px, 15px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(25px, -18px); }
      }
      @keyframes rotate3d {
        0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        25% { transform: rotateX(8deg) rotateY(12deg) rotateZ(2deg); }
        50% { transform: rotateX(0deg) rotateY(20deg) rotateZ(0deg); }
        75% { transform: rotateX(-6deg) rotateY(8deg) rotateZ(-3deg); }
        100% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      }
      @keyframes pulse-text {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.88; }
      }
      @keyframes shimmer {
        0%, 100% { fill-opacity: 1; stroke-opacity: 0.4; }
        50% { fill-opacity: 0.7; stroke-opacity: 0.8; }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 6px #47d19d); }
        50% { filter: drop-shadow(0 0 12px #9ff2cf); }
      }
      @keyframes pulse-node {
        0%, 100% { r: 3; opacity: 0.6; }
        50% { r: 5; opacity: 1; }
      }
      @keyframes traveling-glow {
        0% { transform: translateX(-380px); }
        100% { transform: translateX(300px); }
      }
      .circuit-node { animation: pulse-node 2s ease-in-out infinite; }
      .glow-element { animation: glow 3s ease-in-out infinite; }
      .traveling-glow-text { animation: traveling-glow 4s ease-in-out infinite; }
      #ellipse1 { animation: float1 8s ease-in-out infinite; }
      #ellipse2 { animation: float2 10s ease-in-out infinite; }
      #diamond1 { animation: rotate3d 5s ease-in-out infinite; transform-origin: 860px 198px; }
      #diamond2 { animation: shimmer 3s ease-in-out infinite; }
      .profile-text { animation: pulse-text 4s ease-in-out infinite; }
    </style>
    <linearGradient id="neon-cyan" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4be0a7"/>
      <stop offset="1" stop-color="#e2fff2"/>
    </linearGradient>
    <linearGradient id="neon-magenta" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#86f3c0"/>
      <stop offset="1" stop-color="#d8fff0"/>
    </linearGradient>
    <linearGradient id="bg-tech" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020607"/>
      <stop offset="0.42" stop-color="#050B0B"/>
      <stop offset="0.72" stop-color="#062019"/>
      <stop offset="1" stop-color="#0A3A2F"/>
    </linearGradient>
    <linearGradient id="face" x1="280" y1="150" x2="920" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5fff9"/>
      <stop offset="1" stop-color="#bff5df"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1200" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="glow" x="0" y="0" width="1200" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00D9FF" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow" x="0" y="0" width="1200" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="name-glow-filter" x="0" y="0" width="1200" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00D9FF" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00FFFF" flood-opacity="0.2"/>
    </filter>
    <filter id="traveling-glow-filter" x="-200" y="-100" width="600" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#1a1a1a" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" x="40" y="40" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="40" height="40" fill="none" stroke="#1c4d3f" stroke-width="1" opacity="0.22"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="420" rx="36" fill="url(#bg-tech)"/>
  <rect width="1200" height="420" rx="36" fill="url(#grid)"/>
  
  <!-- Tech accent glows -->
  <ellipse id="ellipse1" cx="220" cy="90" rx="210" ry="150" fill="#63f0b5" fill-opacity="0.12" filter="url(#blur)"/>
  <ellipse id="ellipse2" cx="1040" cy="330" rx="260" ry="170" fill="#f5fff9" fill-opacity="0.06" filter="url(#blur)"/>
  <ellipse cx="820" cy="70" rx="180" ry="70" fill="#b8ffe0" fill-opacity="0.04" filter="url(#blur)"/>
  
  <!-- Flowing steel light streaks -->
  <path d="M40 282C160 182 256 120 406 86C510 62 620 58 756 72" stroke="#f8fffb" stroke-width="2" opacity="0.34" fill="none"/>
  <path d="M60 298C182 208 278 154 410 122C514 96 646 96 792 112" stroke="#7de9b5" stroke-width="1.6" opacity="0.24" fill="none"/>
  <path d="M22 246C146 154 250 106 378 72C494 44 612 44 736 62" stroke="#dffff2" stroke-width="1.4" opacity="0.28" fill="none"/>
  <path d="M500 42C620 72 694 126 768 184C856 252 942 308 1120 336" stroke="#f5fff9" stroke-width="1.2" opacity="0.16" fill="none"/>
  
  <!-- Refined industrial circuit traces -->
  <path d="M808 66L908 66" stroke="#baf8dc" stroke-width="2" opacity="0.35"/>
  <path d="M908 66L908 126" stroke="#baf8dc" stroke-width="2" opacity="0.35"/>
  <path d="M908 126L962 126" stroke="#baf8dc" stroke-width="2" opacity="0.35"/>
  <circle class="circuit-node" cx="808" cy="66" r="3" fill="#baf8dc" opacity="0.7"/>
  <circle class="circuit-node" cx="908" cy="66" r="3" fill="#f5fff9" opacity="0.7"/>
  <circle class="circuit-node" cx="908" cy="126" r="3" fill="#baf8dc" opacity="0.7"/>
  <circle class="circuit-node" cx="962" cy="126" r="3" fill="#f5fff9" opacity="0.5"/>
  
  <path d="M1000 200L1050 200" stroke="#7de9b5" stroke-width="2" opacity="0.28"/>
  <path d="M1050 200L1050 280" stroke="#7de9b5" stroke-width="2" opacity="0.28"/>
  <path d="M1050 280L1100 280" stroke="#7de9b5" stroke-width="2" opacity="0.28"/>
  <circle class="circuit-node" cx="1000" cy="200" r="3" fill="#7de9b5" opacity="0.6"/>
  <circle class="circuit-node" cx="1050" cy="200" r="3" fill="#f5fff9" opacity="0.6"/>
  <circle class="circuit-node" cx="1050" cy="280" r="3" fill="#7de9b5" opacity="0.6"/>
  <circle class="circuit-node" cx="1100" cy="280" r="3" fill="#f5fff9" opacity="0.5"/>
  
  <!-- 3D geometric shapes with neon glow -->
  <g class="glow-element">
    <path id="diamond1" d="M860 64L1094 198L860 332L626 198L860 64Z" fill="none" stroke="url(#neon-cyan)" stroke-opacity="0.24" stroke-width="2.5"/>
    <path id="diamond2" d="M860 92L1060 198L860 304L660 198L860 92Z" fill="none" stroke="url(#neon-magenta)" stroke-opacity="0.38" stroke-width="2.5"/>
  </g>
  
  <!-- Tech hexagons -->
  <g opacity="0.25">
    <polygon points="200,320 220,310 240,320 220,340" fill="none" stroke="#7de9b5" stroke-width="1.5"/>
    <polygon points="960,80 980,70 1000,80 980,100" fill="none" stroke="#f5fff9" stroke-width="1.5"/>
  </g>

  <!-- Main name with traveling black glow effect -->
  <g filter="url(#name-glow-filter)" class="profile-text">
    <text x="70" y="170" font-family="'Courier New', monospace" font-size="88" font-weight="800" fill="url(#face)" letter-spacing="2">Bishal Sarkar</text>
  </g>
  
  <!-- Traveling dark glow constrained to text -->
  <g class="traveling-glow-text" filter="url(#traveling-glow-filter)">
    <text x="70" y="170" font-family="'Courier New', monospace" font-size="88" font-weight="800" fill="none" letter-spacing="2" opacity="0.5">Bishal Sarkar</text>
  </g>

  <!-- Tagline with neon effect -->
  <g filter="url(#glow)" class="profile-text" style="animation-delay: 0.5s;">
    <text x="84" y="248" font-family="'Courier New', monospace" font-size="28" font-weight="600" fill="#00D9FF" letter-spacing="3">ARCHITECT • DESIGNER • DEVELOPER</text>
  </g>

  <!-- Tech bars with gradient -->
  <rect x="80" y="286" width="220" height="16" rx="8" fill="url(#neon-cyan)" opacity="0.7"/>
  <rect x="80" y="318" width="360" height="8" rx="4" fill="url(#neon-magenta)" opacity="0.5"/>
  <rect x="80" y="342" width="280" height="8" rx="4" fill="url(#neon-cyan)" opacity="0.35"/>
</svg>
